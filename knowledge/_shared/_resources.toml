[[resources]]
[resources.resource]
name = "DEI"
field = "dei"
group = "community"
patterns = ["dei", "dei.md", "dei.txt"]
dirs = ["docs", ".github", ".gitlab"]

# Security

[[resources]]
[resources.resource]
name = "Security Policy"
field = "policy"
group = "security"
patterns = ["security", "security.md", "security.txt", "security.rst", "security.adoc"]
dirs = ["docs", ".github", ".gitlab"]

[[resources]]
[resources.resource]
name = "Threat Model"
field = "threat_model"
group = "security"
patterns = ["threat_model", "threat_model.md", "threat_model.txt", "threat-model", "threat-model.md"]

[[resources]]
[resources.resource]
name = "Audit"
field = "audit"
group = "security"
patterns = ["audit", "audit.md", "audit.txt", "audit.rst"]

# Metadata (machine-readable)

[[resources]]
[resources.resource]
name = "Funding"
field = "funding"
group = "metadata"
patterns = ["funding.yml", "funding.yaml", "funding.json"]
dirs = [".github", ".gitlab", "docs"]

[[resources]]
[resources.resource]
name = "Citation"
field = "citation"
group = "metadata"
patterns = ["citation.cff", "citation", "citation.bib", "citation.md", "citation.txt"]

[[resources]]
[resources.resource]
name = "publiccode"
field = "publiccode"
group = "metadata"
patterns = ["publiccode.yml", "publiccode.yaml"]

[[resources]]
[resources.resource]
name = "codemeta"
field = "codemeta"
group = "metadata"
patterns = ["codemeta.json"]

[[resources]]
[resources.resource]
name = "Zenodo"
field = "zenodo"
group = "metadata"
patterns = [".zenodo.json"]
