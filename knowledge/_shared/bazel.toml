[tool]
name = "Bazel"
category = "monorepo"
homepage = "https://bazel.build"
docs = "https://bazel.build/docs"
repo = "https://github.com/bazelbuild/bazel"
description = "Build and test tool for multi-language monorepos"

[detect]
files = ["WORKSPACE", "WORKSPACE.bazel", "MODULE.bazel", "BUILD.bazel"]

[commands]
run = "bazel build //..."
alternatives = ["bazel test //..."]

[config]
files = ["WORKSPACE", "WORKSPACE.bazel", "MODULE.bazel", ".bazelrc"]
