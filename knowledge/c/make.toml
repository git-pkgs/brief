[tool]
name = "Make"
category = "build"
homepage = "https://www.gnu.org/software/make/"
docs = "https://www.gnu.org/software/make/manual/"
description = "Build automation tool"

[detect]
files = ["Makefile", "GNUmakefile", "makefile"]
ecosystems = ["c", "cpp"]

[commands]
run = "make"
alternatives = ["make all", "make clean"]
