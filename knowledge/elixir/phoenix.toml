[tool]
name = "Phoenix"
category = "build"
homepage = "https://www.phoenixframework.org"
docs = "https://hexdocs.pm/phoenix"
repo = "https://github.com/phoenixframework/phoenix"
description = "Web framework for Elixir"

[detect]
ecosystems = ["elixir"]

[detect.file_contains]
"mix.exs" = [":phoenix"]

[commands]
run = "mix phx.server"

[config]
files = ["config/config.exs"]

[taxonomy]
role = ["framework"]
function = ["api-development", "templating"]
layer = ["backend", "full-stack"]
domain = ["web-development"]

[[security.sinks]]
symbol = "raw"
threat = "xss"
cwe = "CWE-79"
note = "Phoenix.HTML.raw bypasses escaping"

[[security.sinks]]
symbol = "safe_to_string"
threat = "xss"
cwe = "CWE-79"

[[security.sinks]]
symbol = "redirect"
threat = "open_redirect"
cwe = "CWE-601"
note = "With external: target"

[[security.sinks]]
symbol = "send_file"
threat = "path_traversal"
cwe = "CWE-22"
note = "Plug.Conn.send_file"

[[security.sinks]]
symbol = "send_download"
threat = "path_traversal"
cwe = "CWE-22"
