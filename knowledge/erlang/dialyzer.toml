[tool]
name = "Dialyzer"
category = "typecheck"
default = true
homepage = "https://www.erlang.org/doc/apps/dialyzer/"
docs = "https://www.erlang.org/doc/apps/dialyzer/"
description = "Static analysis tool for Erlang"

[detect]
ecosystems = ["erlang"]

[detect.file_contains]
"rebar.config" = ["dialyzer"]

[commands]
run = "rebar3 dialyzer"

[taxonomy]
function = ["type-checking"]
