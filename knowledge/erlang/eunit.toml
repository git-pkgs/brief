[tool]
name = "EUnit"
category = "test"
default = true
homepage = "https://www.erlang.org/doc/apps/eunit/"
docs = "https://www.erlang.org/doc/apps/eunit/"
description = "Erlang unit testing framework"

[detect]
files = ["test/", "**/*_tests.erl"]
ecosystems = ["erlang"]

[commands]
run = "rebar3 eunit"

[taxonomy]
role = ["testing-framework"]
function = ["testing"]
