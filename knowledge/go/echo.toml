[tool]
name = "Echo"
category = "build"
homepage = "https://echo.labstack.com"
docs = "https://echo.labstack.com/docs"
repo = "https://github.com/labstack/echo"
description = "High performance Go web framework"

[detect]
dependencies = ["github.com/labstack/echo", "github.com/labstack/echo/v4", "github.com/labstack/echo/v5"]
ecosystems = ["go"]

[commands]
run = "go run ."

[taxonomy]
role = ["framework"]
function = ["api-development"]
layer = ["backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "c.HTML"
threat = "xss"
cwe = "CWE-79"
note = "Renders raw HTML string"

[[security.sinks]]
symbol = "c.HTMLBlob"
threat = "xss"
cwe = "CWE-79"

[[security.sinks]]
symbol = "c.Redirect"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "c.File"
threat = "path_traversal"
cwe = "CWE-22"

[[security.sinks]]
symbol = "c.Attachment"
threat = "path_traversal"
cwe = "CWE-22"
