[tool]
name = "Fiber"
category = "build"
homepage = "https://gofiber.io"
docs = "https://docs.gofiber.io"
repo = "https://github.com/gofiber/fiber"
description = "Express-inspired web framework for Go"

[detect]
dependencies = ["github.com/gofiber/fiber", "github.com/gofiber/fiber/v2", "github.com/gofiber/fiber/v3"]
ecosystems = ["go"]

[commands]
run = "go run ."

[taxonomy]
role = ["framework"]
function = ["api-development"]
layer = ["backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "c.SendString"
threat = "xss"
cwe = "CWE-79"
note = "When Content-Type is text/html"

[[security.sinks]]
symbol = "c.Redirect"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "c.SendFile"
threat = "path_traversal"
cwe = "CWE-22"

[[security.sinks]]
symbol = "c.Download"
threat = "path_traversal"
cwe = "CWE-22"
