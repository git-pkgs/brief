[tool]
name = "gofmt"
category = "format"
default = true
homepage = "https://pkg.go.dev/cmd/gofmt"
docs = "https://pkg.go.dev/cmd/gofmt"
description = "Built-in Go code formatter"

[detect]
files = ["go.mod"]
ecosystems = ["go"]

[commands]
run = "gofmt -w ."
alternatives = ["gofmt -l ."]

[taxonomy]
role = ["formatter"]
