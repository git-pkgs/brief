[tool]
name = "pgx"
category = "database"
homepage = "https://github.com/jackc/pgx"
docs = "https://pkg.go.dev/github.com/jackc/pgx/v5"
repo = "https://github.com/jackc/pgx"
description = "PostgreSQL driver and toolkit for Go"

[detect]
dependencies = ["github.com/jackc/pgx", "github.com/jackc/pgx/v4", "github.com/jackc/pgx/v5"]
ecosystems = ["go"]

[taxonomy]
role = ["library"]
function = ["data-mapping"]
layer = ["data-layer"]

[[security.sinks]]
symbol = "Query"
threat = "sql_injection"
cwe = "CWE-89"
note = "When query built via Sprintf; use $1 placeholders"

[[security.sinks]]
symbol = "QueryRow"
threat = "sql_injection"
cwe = "CWE-89"

[[security.sinks]]
symbol = "Exec"
threat = "sql_injection"
cwe = "CWE-89"
