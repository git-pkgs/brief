[tool]
name = "sqlx"
category = "database"
homepage = "https://github.com/jmoiron/sqlx"
docs = "https://pkg.go.dev/github.com/jmoiron/sqlx"
repo = "https://github.com/jmoiron/sqlx"
description = "Extensions to Go database/sql"

[detect]
dependencies = ["github.com/jmoiron/sqlx"]
ecosystems = ["go"]

[taxonomy]
role = ["library"]
function = ["data-mapping"]
layer = ["data-layer"]

[[security.sinks]]
symbol = "Query"
threat = "sql_injection"
cwe = "CWE-89"
note = "When query built via Sprintf; use bindvars"

[[security.sinks]]
symbol = "Queryx"
threat = "sql_injection"
cwe = "CWE-89"

[[security.sinks]]
symbol = "Exec"
threat = "sql_injection"
cwe = "CWE-89"

[[security.sinks]]
symbol = "Get"
threat = "sql_injection"
cwe = "CWE-89"

[[security.sinks]]
symbol = "Select"
threat = "sql_injection"
cwe = "CWE-89"
