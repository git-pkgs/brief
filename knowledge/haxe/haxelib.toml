[tool]
name = "Haxelib"
category = "package_manager"
homepage = "https://lib.haxe.org"
docs = "https://haxe.org/documentation/introduction/"
description = "Haxe package manager"

[detect]
files = ["haxelib.json"]
ecosystems = ["haxe"]

[commands]
run = "haxelib install"

[config]
files = ["haxelib.json"]

[taxonomy]
role = ["package-manager"]
