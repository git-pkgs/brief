[tool]
name = "Kotlin"
category = "language"
homepage = "https://kotlinlang.org"
docs = "https://kotlinlang.org/docs/"
repo = "https://github.com/JetBrains/kotlin"
description = "Modern, concise programming language for the JVM"

[detect]
files = ["*.kt", "**/*.kt", "*.kts", "build.gradle.kts"]
ecosystems = ["kotlin"]

[taxonomy]
role = ["language"]

[[security.sinks]]
symbol = "Runtime.getRuntime().exec"
threat = "command_injection"
cwe = "CWE-78"
note = "JVM; same as Java"

[[security.sinks]]
symbol = "ProcessBuilder"
threat = "command_injection"
cwe = "CWE-78"

[[security.sinks]]
symbol = "ObjectInputStream.readObject"
threat = "deserialization"
cwe = "CWE-502"
note = "JVM native serialization"

[[security.sinks]]
symbol = "Class.forName"
threat = "unsafe_reflection"
cwe = "CWE-470"
note = "When class name is caller-controlled"

[[security.sinks]]
symbol = "KClass.createInstance"
threat = "unsafe_reflection"
cwe = "CWE-470"

[[security.sinks]]
symbol = "ScriptEngine.eval"
threat = "code_injection"
cwe = "CWE-95"
note = "javax.script"

[[security.sinks]]
symbol = "File.readText"
threat = "path_traversal"
cwe = "CWE-22"
note = "kotlin.io"

[[security.sinks]]
symbol = "File.writeText"
threat = "path_traversal"
cwe = "CWE-22"

[[security.sinks]]
symbol = "Path.readText"
threat = "path_traversal"
cwe = "CWE-22"
note = "kotlin.io.path"

[[security.sinks]]
symbol = "URL.readText"
threat = "ssrf"
cwe = "CWE-918"

[[security.sinks]]
symbol = "java.net.http.HttpClient.send"
threat = "ssrf"
cwe = "CWE-918"

[[security.sinks]]
symbol = "Random"
threat = "weak_crypto"
cwe = "CWE-338"
note = "kotlin.random.Random; use java.security.SecureRandom"
