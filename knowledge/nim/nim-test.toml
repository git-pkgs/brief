[tool]
name = "testament"
category = "test"
default = true
homepage = "https://nim-lang.org/docs/testament.html"
docs = "https://nim-lang.org/docs/testament.html"
description = "Nim test runner"

[detect]
files = ["tests/", "*.nimble"]
ecosystems = ["nim"]

[commands]
run = "nimble test"
alternatives = ["testament all"]

[taxonomy]
role = ["testing-framework"]
function = ["testing"]
