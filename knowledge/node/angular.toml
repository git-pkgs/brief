[tool]
name = "Angular"
category = "build"
homepage = "https://angular.dev"
docs = "https://angular.dev/overview"
repo = "https://github.com/angular/angular"
description = "Web application framework"

[detect]
files = ["angular.json", ".angular/"]
dependencies = ["@angular/core", "@angular/cli"]
ecosystems = ["node"]

[commands]
run = "npx ng serve"
alternatives = ["npx ng build"]

[config]
files = ["angular.json"]

[taxonomy]
role = ["framework"]
function = ["templating"]
layer = ["frontend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "bypassSecurityTrustHtml"
threat = "xss"
cwe = "CWE-79"
note = "DomSanitizer"

[[security.sinks]]
symbol = "bypassSecurityTrustUrl"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "bypassSecurityTrustScript"
threat = "xss"
cwe = "CWE-79"

[[security.sinks]]
symbol = "innerHTML"
threat = "xss"
cwe = "CWE-79"
note = "[innerHTML] binding; sanitizes by default but bypasses exist"
