[tool]
name = "Astro"
category = "build"
homepage = "https://astro.build"
docs = "https://docs.astro.build"
repo = "https://github.com/withastro/astro"
description = "Content-driven web framework"

[detect]
files = ["astro.config.mjs", "astro.config.ts", "astro.config.js"]
dependencies = ["astro"]
ecosystems = ["node"]

[commands]
run = "npx astro dev"
alternatives = ["npx astro build"]

[config]
files = ["astro.config.mjs", "astro.config.ts", "astro.config.js"]

[taxonomy]
role = ["framework"]
function = ["templating", "site-generation"]
layer = ["frontend", "full-stack"]
domain = ["web-development", "content-management"]

[[security.sinks]]
symbol = "set:html"
threat = "xss"
cwe = "CWE-79"
note = "Directive that renders raw HTML without escaping"

[[security.sinks]]
symbol = "Fragment"
threat = "xss"
cwe = "CWE-79"
note = "set:html on Fragment"

[[security.sinks]]
symbol = "Astro.redirect"
threat = "open_redirect"
cwe = "CWE-601"
note = "In SSR mode with caller-controlled URL"

[[security.sinks]]
symbol = "Response.redirect"
threat = "open_redirect"
cwe = "CWE-601"
note = "In API routes/endpoints"

[[security.sinks]]
symbol = "dangerouslySetInnerHTML"
threat = "xss"
cwe = "CWE-79"
note = "When using React components in Astro"
