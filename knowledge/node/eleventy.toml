[tool]
name = "Eleventy"
category = "build"
homepage = "https://www.11ty.dev"
docs = "https://www.11ty.dev/docs/"
repo = "https://github.com/11ty/eleventy"
description = "Simple static site generator"

[detect]
files = [".eleventy.js", "eleventy.config.js", "eleventy.config.mjs", "eleventy.config.cjs"]
dependencies = ["@11ty/eleventy"]
dev_dependencies = ["@11ty/eleventy"]
ecosystems = ["node"]

[commands]
run = "npx eleventy --serve"
alternatives = ["npx eleventy"]

[config]
files = [".eleventy.js", "eleventy.config.js", "eleventy.config.mjs", "eleventy.config.cjs"]

[taxonomy]
role = ["framework"]
function = ["templating", "site-generation"]
layer = ["frontend"]
domain = ["web-development", "content-management"]

[[security.sinks]]
symbol = "|safe"
threat = "xss"
cwe = "CWE-79"
note = "Nunjucks filter; Eleventy defaults to Nunjucks"

[[security.sinks]]
symbol = "{{{"
threat = "xss"
cwe = "CWE-79"
note = "Handlebars triple-stash if using Handlebars engine"

[[security.sinks]]
symbol = "<%-"
threat = "xss"
cwe = "CWE-79"
note = "EJS unescaped output if using EJS engine"

[[security.sinks]]
symbol = "addShortcode"
threat = "ssti"
cwe = "CWE-1336"
note = "Shortcodes with raw HTML return; developer-controlled not user-controlled usually"
