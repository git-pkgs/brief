[tool]
name = "Ember.js"
category = "build"
homepage = "https://emberjs.com"
docs = "https://guides.emberjs.com"
repo = "https://github.com/emberjs/ember.js"
description = "Framework for ambitious web applications"

[detect]
files = [".ember-cli", "ember-cli-build.js"]
dependencies = ["ember-cli", "ember-source"]
ecosystems = ["node"]

[commands]
run = "npx ember serve"
alternatives = ["npx ember build"]

[config]
files = [".ember-cli", "ember-cli-build.js"]

[taxonomy]
role = ["framework"]
function = ["templating"]
layer = ["frontend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "{{{"
threat = "xss"
cwe = "CWE-79"
note = "Triple-stash unescaped in Handlebars templates"

[[security.sinks]]
symbol = "htmlSafe"
threat = "xss"
cwe = "CWE-79"
note = "Ember.String.htmlSafe marks string as pre-escaped"

[[security.sinks]]
symbol = "SafeString"
threat = "xss"
cwe = "CWE-79"
note = "Handlebars.SafeString"

[[security.sinks]]
symbol = "transitionTo"
threat = "open_redirect"
cwe = "CWE-601"
note = "When route/URL is caller-controlled"

[[security.sinks]]
symbol = "replaceWith"
threat = "open_redirect"
cwe = "CWE-601"
