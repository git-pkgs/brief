[tool]
name = "execa"
category = "build"
homepage = "https://github.com/sindresorhus/execa"
docs = "https://github.com/sindresorhus/execa"
repo = "https://github.com/sindresorhus/execa"
description = "Process execution for Node.js"

[detect]
dependencies = ["execa"]
ecosystems = ["node"]

[taxonomy]
role = ["library"]
function = ["process-execution"]
layer = ["backend"]

[[security.sinks]]
symbol = "execa"
threat = "command_injection"
cwe = "CWE-78"
note = "Array form is safe; shell:true or execaCommand are not"

[[security.sinks]]
symbol = "execaCommand"
threat = "command_injection"
cwe = "CWE-78"
note = "Parses string into shell command"

[[security.sinks]]
symbol = "$"
threat = "command_injection"
cwe = "CWE-78"
note = "Template tag; interpolations are escaped but verify"
