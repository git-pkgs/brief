[tool]
name = "Express"
category = "build"
homepage = "https://expressjs.com"
docs = "https://expressjs.com/en/guide/routing.html"
repo = "https://github.com/expressjs/express"
description = "Web framework for Node.js"

[detect]
dependencies = ["express"]
ecosystems = ["node"]

[taxonomy]
role = ["framework"]
function = ["api-development"]
layer = ["backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "res.send"
threat = "xss"
cwe = "CWE-79"
note = "When sending raw HTML without Content-Type override"

[[security.sinks]]
symbol = "res.write"
threat = "xss"
cwe = "CWE-79"

[[security.sinks]]
symbol = "res.redirect"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "res.sendFile"
threat = "path_traversal"
cwe = "CWE-22"

[[security.sinks]]
symbol = "res.download"
threat = "path_traversal"
cwe = "CWE-22"

[[security.sinks]]
symbol = "res.render"
threat = "ssti"
cwe = "CWE-1336"
note = "When view name is caller-controlled"
