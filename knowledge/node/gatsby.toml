[tool]
name = "Gatsby"
category = "build"
homepage = "https://www.gatsbyjs.com"
docs = "https://www.gatsbyjs.com/docs/"
repo = "https://github.com/gatsbyjs/gatsby"
description = "React-based static site generator"

[detect]
files = ["gatsby-config.js", "gatsby-config.ts", "gatsby-config.mjs"]
dependencies = ["gatsby"]
ecosystems = ["node"]

[commands]
run = "npx gatsby develop"
alternatives = ["npx gatsby build"]

[config]
files = ["gatsby-config.js", "gatsby-config.ts", "gatsby-node.js"]

[taxonomy]
role = ["framework"]
function = ["templating", "site-generation"]
layer = ["frontend"]
domain = ["web-development", "content-management"]

[[security.sinks]]
symbol = "dangerouslySetInnerHTML"
threat = "xss"
cwe = "CWE-79"
note = "React prop; common in Gatsby for CMS HTML"

[[security.sinks]]
symbol = "createPage"
threat = "path_traversal"
cwe = "CWE-22"
note = "In gatsby-node.js with caller-controlled path"

[[security.sinks]]
symbol = "graphql"
threat = "sql_injection"
cwe = "CWE-89"
note = "When query variables from URL params without validation"
