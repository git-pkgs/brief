[tool]
name = "Hono"
category = "build"
homepage = "https://hono.dev"
docs = "https://hono.dev/docs"
repo = "https://github.com/honojs/hono"
description = "Lightweight web framework for multiple runtimes"

[detect]
dependencies = ["hono"]
ecosystems = ["node"]

[taxonomy]
role = ["framework"]
function = ["api-development"]
layer = ["backend", "edge"]
domain = ["web-development"]

[[security.sinks]]
symbol = "c.html"
threat = "xss"
cwe = "CWE-79"
note = "Renders without escaping; use jsx or escape manually"

[[security.sinks]]
symbol = "c.redirect"
threat = "open_redirect"
cwe = "CWE-601"
