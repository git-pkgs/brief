[tool]
name = "Jest"
category = "test"
default = true
homepage = "https://jestjs.io"
docs = "https://jestjs.io/docs/getting-started"
repo = "https://github.com/jestjs/jest"
description = "JavaScript testing framework"

[detect]
files = ["jest.config.js", "jest.config.ts", "jest.config.mjs", "jest.config.cjs"]
dependencies = ["jest"]
dev_dependencies = ["jest"]
ecosystems = ["node"]
[detect.key_exists]
"package.json" = ["jest"]

[commands]
run = "npx jest"
alternatives = ["npm test"]

[config]
files = ["jest.config.js", "jest.config.ts", "jest.config.mjs", "jest.config.cjs"]
