[tool]
name = "Knex.js"
category = "database"
homepage = "https://knexjs.org"
docs = "https://knexjs.org/guide/"
repo = "https://github.com/knex/knex"
description = "SQL query builder for Node.js"

[detect]
files = ["knexfile.js", "knexfile.ts"]
dependencies = ["knex"]
ecosystems = ["node"]

[commands]
run = "npx knex migrate:latest"

[config]
files = ["knexfile.js", "knexfile.ts"]

[taxonomy]
role = ["library"]
function = ["data-mapping"]
layer = ["data-layer"]

[[security.sinks]]
symbol = "raw"
threat = "sql_injection"
cwe = "CWE-89"
note = "knex.raw with interpolation; bindings are safe"

[[security.sinks]]
symbol = "whereRaw"
threat = "sql_injection"
cwe = "CWE-89"

[[security.sinks]]
symbol = "joinRaw"
threat = "sql_injection"
cwe = "CWE-89"

[[security.sinks]]
symbol = "havingRaw"
threat = "sql_injection"
cwe = "CWE-89"

[[security.sinks]]
symbol = "orderByRaw"
threat = "sql_injection"
cwe = "CWE-89"

[[security.sinks]]
symbol = "groupByRaw"
threat = "sql_injection"
cwe = "CWE-89"
