[tool]
name = "Koa"
category = "build"
homepage = "https://koajs.com"
docs = "https://github.com/koajs/koa/wiki"
repo = "https://github.com/koajs/koa"
description = "Expressive HTTP middleware framework for Node.js"

[detect]
dependencies = ["koa"]
ecosystems = ["node"]

[taxonomy]
role = ["framework"]
function = ["api-development"]
layer = ["backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "ctx.body"
threat = "xss"
cwe = "CWE-79"
note = "When set to raw HTML string"

[[security.sinks]]
symbol = "ctx.redirect"
threat = "open_redirect"
cwe = "CWE-601"
