[tool]
name = "JavaScript"
category = "language"
homepage = "https://developer.mozilla.org/en-US/docs/Web/JavaScript"
docs = "https://developer.mozilla.org/en-US/docs/Web/JavaScript"
description = "Dynamic programming language for the web"

[detect]
files = ["package.json", "*.js", "**/*.js", "*.mjs"]
ecosystems = ["node"]

[taxonomy]
role = ["language"]

[[security.sinks]]
symbol = "eval"
threat = "code_injection"
cwe = "CWE-95"

[[security.sinks]]
symbol = "Function"
threat = "code_injection"
cwe = "CWE-95"
note = "new Function(string) is eval"

[[security.sinks]]
symbol = "setTimeout"
threat = "code_injection"
cwe = "CWE-95"
note = "Only with string argument"

[[security.sinks]]
symbol = "setInterval"
threat = "code_injection"
cwe = "CWE-95"
note = "Only with string argument"

[[security.sinks]]
symbol = "child_process.exec"
threat = "command_injection"
cwe = "CWE-78"
note = "Spawns shell; prefer execFile or spawn with array args"

[[security.sinks]]
symbol = "child_process.execSync"
threat = "command_injection"
cwe = "CWE-78"

[[security.sinks]]
symbol = "child_process.spawn"
threat = "command_injection"
cwe = "CWE-78"
note = "Only with shell:true option"

[[security.sinks]]
symbol = "child_process.spawnSync"
threat = "command_injection"
cwe = "CWE-78"
note = "Only with shell:true option"

[[security.sinks]]
symbol = "vm.runInNewContext"
threat = "code_injection"
cwe = "CWE-95"
note = "vm module is not a security sandbox"

[[security.sinks]]
symbol = "vm.runInThisContext"
threat = "code_injection"
cwe = "CWE-95"

[[security.sinks]]
symbol = "vm.Script"
threat = "code_injection"
cwe = "CWE-95"

[[security.sinks]]
symbol = "require"
threat = "code_injection"
cwe = "CWE-470"
note = "When module path is caller-controlled"

[[security.sinks]]
symbol = "fs.readFile"
threat = "path_traversal"
cwe = "CWE-22"
note = "When path is caller-controlled"

[[security.sinks]]
symbol = "fs.readFileSync"
threat = "path_traversal"
cwe = "CWE-22"

[[security.sinks]]
symbol = "fs.writeFile"
threat = "path_traversal"
cwe = "CWE-22"

[[security.sinks]]
symbol = "fs.writeFileSync"
threat = "path_traversal"
cwe = "CWE-22"

[[security.sinks]]
symbol = "fs.createReadStream"
threat = "path_traversal"
cwe = "CWE-22"

[[security.sinks]]
symbol = "path.join"
threat = "path_traversal"
cwe = "CWE-22"
note = "Does not normalize ../; use path.resolve and check prefix"

[[security.sinks]]
symbol = "JSON.parse"
threat = "dos"
cwe = "CWE-400"
note = "Prototype pollution via __proto__ in older parsers; size limits"

[[security.sinks]]
symbol = "Object.assign"
threat = "mass_assignment"
cwe = "CWE-915"
note = "Prototype pollution when source is caller-controlled"

[[security.sinks]]
symbol = "node-serialize.unserialize"
threat = "deserialization"
cwe = "CWE-502"
note = "node-serialize package, not stdlib"

[[security.sinks]]
symbol = "http.get"
threat = "ssrf"
cwe = "CWE-918"
note = "When URL is caller-controlled"

[[security.sinks]]
symbol = "https.get"
threat = "ssrf"
cwe = "CWE-918"

[[security.sinks]]
symbol = "http.request"
threat = "ssrf"
cwe = "CWE-918"
