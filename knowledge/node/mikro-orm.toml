[tool]
name = "MikroORM"
category = "database"
homepage = "https://mikro-orm.io"
docs = "https://mikro-orm.io/docs/guide"
repo = "https://github.com/mikro-orm/mikro-orm"
description = "TypeScript ORM with data mapper pattern"

[detect]
dependencies = ["@mikro-orm/core"]
ecosystems = ["node"]

[taxonomy]
role = ["library"]
function = ["data-mapping"]
layer = ["data-layer"]

[[security.sinks]]
symbol = "execute"
threat = "sql_injection"
cwe = "CWE-89"
note = "em.execute / em.getConnection().execute"

[[security.sinks]]
symbol = "raw"
threat = "sql_injection"
cwe = "CWE-89"
note = "qb.raw"
