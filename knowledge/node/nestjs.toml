[tool]
name = "NestJS"
category = "build"
homepage = "https://nestjs.com"
docs = "https://docs.nestjs.com"
repo = "https://github.com/nestjs/nest"
description = "Progressive Node.js framework"

[detect]
files = ["nest-cli.json"]
dependencies = ["@nestjs/core", "@nestjs/cli"]
ecosystems = ["node"]

[commands]
run = "npx nest start"
alternatives = ["npx nest build"]

[config]
files = ["nest-cli.json"]

[taxonomy]
role = ["framework"]
function = ["api-development", "dependency-injection"]
layer = ["backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "@Redirect"
threat = "open_redirect"
cwe = "CWE-601"
note = "When url is caller-controlled"

[[security.sinks]]
symbol = "res.send"
threat = "xss"
cwe = "CWE-79"
note = "Express passthrough"
