[tool]
name = "Next.js"
category = "build"
homepage = "https://nextjs.org"
docs = "https://nextjs.org/docs"
repo = "https://github.com/vercel/next.js"
description = "React framework for full-stack web applications"

[detect]
files = ["next.config.js", "next.config.mjs", "next.config.ts"]
dependencies = ["next"]
ecosystems = ["node"]

[detect.file_contains]
".gitignore" = [".next/"]

[commands]
run = "npx next dev"
alternatives = ["npx next build"]

[config]
files = ["next.config.js", "next.config.mjs", "next.config.ts"]

[taxonomy]
role = ["framework"]
function = ["api-development", "templating"]
layer = ["full-stack", "frontend", "backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "dangerouslySetInnerHTML"
threat = "xss"
cwe = "CWE-79"

[[security.sinks]]
symbol = "redirect"
threat = "open_redirect"
cwe = "CWE-601"
note = "next/navigation redirect in route handlers"

[[security.sinks]]
symbol = "NextResponse.redirect"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "rewrites"
threat = "ssrf"
cwe = "CWE-918"
note = "next.config.js rewrites with caller-controlled destination"
