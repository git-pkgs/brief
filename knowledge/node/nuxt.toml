[tool]
name = "Nuxt"
category = "build"
homepage = "https://nuxt.com"
docs = "https://nuxt.com/docs"
repo = "https://github.com/nuxt/nuxt"
description = "Vue.js framework for full-stack web applications"

[detect]
files = ["nuxt.config.ts", "nuxt.config.js"]
dependencies = ["nuxt"]
ecosystems = ["node"]

[detect.file_contains]
".gitignore" = [".nuxt/"]

[commands]
run = "npx nuxt dev"
alternatives = ["npx nuxt build"]

[config]
files = ["nuxt.config.ts", "nuxt.config.js"]

[taxonomy]
role = ["framework"]
function = ["api-development", "templating"]
layer = ["full-stack", "frontend", "backend"]
domain = ["web-development"]
