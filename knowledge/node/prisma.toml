[tool]
name = "Prisma"
category = "database"
homepage = "https://www.prisma.io"
docs = "https://www.prisma.io/docs"
repo = "https://github.com/prisma/prisma"
description = "TypeScript ORM with declarative schema and migrations"

[detect]
files = ["prisma/schema.prisma"]
dev_dependencies = ["prisma"]
dependencies = ["@prisma/client"]
ecosystems = ["node"]

[commands]
run = "npx prisma migrate dev"
alternatives = ["npx prisma db push", "npx prisma generate"]

[config]
files = ["prisma/schema.prisma"]

[taxonomy]
role = ["library"]
function = ["data-mapping", "code-generation"]
layer = ["data-layer"]

[[security.sinks]]
symbol = "$queryRaw"
threat = "sql_injection"
cwe = "CWE-89"
note = "Tagged template is safe; concat is not"

[[security.sinks]]
symbol = "$queryRawUnsafe"
threat = "sql_injection"
cwe = "CWE-89"

[[security.sinks]]
symbol = "$executeRaw"
threat = "sql_injection"
cwe = "CWE-89"

[[security.sinks]]
symbol = "$executeRawUnsafe"
threat = "sql_injection"
cwe = "CWE-89"
