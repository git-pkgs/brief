[tool]
name = "React"
category = "build"
homepage = "https://react.dev"
docs = "https://react.dev/learn"
repo = "https://github.com/facebook/react"
description = "Library for building user interfaces"

[detect]
dependencies = ["react"]
ecosystems = ["node"]

[commands]
run = "npm run dev"

[taxonomy]
role = ["library"]
function = ["templating"]
layer = ["frontend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "dangerouslySetInnerHTML"
threat = "xss"
cwe = "CWE-79"

[[security.sinks]]
symbol = "href"
threat = "xss"
cwe = "CWE-79"
note = "javascript: URLs in <a href>; React 19+ blocks by default"
