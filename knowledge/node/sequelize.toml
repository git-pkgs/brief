[tool]
name = "Sequelize"
category = "database"
homepage = "https://sequelize.org"
docs = "https://sequelize.org/docs/v6/"
repo = "https://github.com/sequelize/sequelize"
description = "Promise-based ORM for Node.js"

[detect]
files = [".sequelizerc"]
dependencies = ["sequelize"]
ecosystems = ["node"]

[commands]
run = "npx sequelize-cli db:migrate"

[config]
files = [".sequelizerc"]

[taxonomy]
role = ["library"]
function = ["data-mapping"]
layer = ["data-layer"]

[[security.sinks]]
symbol = "query"
threat = "sql_injection"
cwe = "CWE-89"
note = "sequelize.query with interpolated string"

[[security.sinks]]
symbol = "literal"
threat = "sql_injection"
cwe = "CWE-89"
note = "Sequelize.literal"

[[security.sinks]]
symbol = "fn"
threat = "sql_injection"
cwe = "CWE-89"
note = "When fn args are caller-controlled"

[[security.sinks]]
symbol = "where"
threat = "sql_injection"
cwe = "CWE-89"
note = "With literal fragment"
