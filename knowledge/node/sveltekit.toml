[tool]
name = "SvelteKit"
category = "build"
homepage = "https://svelte.dev/docs/kit"
docs = "https://svelte.dev/docs/kit/introduction"
repo = "https://github.com/sveltejs/kit"
description = "Web application framework for Svelte"

[detect]
files = ["svelte.config.js", "svelte.config.ts"]
dependencies = ["@sveltejs/kit"]
ecosystems = ["node"]

[detect.file_contains]
".gitignore" = [".svelte-kit/"]

[commands]
run = "npx vite dev"
alternatives = ["npx vite build"]

[config]
files = ["svelte.config.js", "svelte.config.ts"]

[taxonomy]
role = ["framework"]
function = ["api-development", "templating"]
layer = ["full-stack", "frontend", "backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "{@html}"
threat = "xss"
cwe = "CWE-79"
note = "Svelte directive that bypasses escaping"

[[security.sinks]]
symbol = "redirect"
threat = "open_redirect"
cwe = "CWE-601"
note = "@sveltejs/kit redirect"
