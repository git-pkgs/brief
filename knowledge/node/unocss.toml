[tool]
name = "UnoCSS"
category = "build"
homepage = "https://unocss.dev"
docs = "https://unocss.dev/guide/"
repo = "https://github.com/unocss/unocss"
description = "On-demand atomic CSS engine"

[detect]
files = ["uno.config.js", "uno.config.ts", "uno.config.mjs", "uno.config.mts"]
dependencies = ["unocss"]
ecosystems = ["node"]

[commands]
run = "npx unocss"

[config]
files = ["uno.config.js", "uno.config.ts"]

[taxonomy]
role = ["library"]
layer = ["frontend"]
domain = ["web-development"]
function = ["styling"]
