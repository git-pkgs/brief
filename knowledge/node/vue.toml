[tool]
name = "Vue"
category = "build"
homepage = "https://vuejs.org"
docs = "https://vuejs.org/guide/introduction"
repo = "https://github.com/vuejs/core"
description = "Progressive JavaScript framework"

[detect]
dependencies = ["vue"]
ecosystems = ["node"]

[commands]
run = "npm run dev"

[taxonomy]
role = ["framework"]
function = ["templating"]
layer = ["frontend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "v-html"
threat = "xss"
cwe = "CWE-79"

[[security.sinks]]
symbol = "innerHTML"
threat = "xss"
cwe = "CWE-79"
note = "Direct DOM manipulation in lifecycle hooks"
