[tool]
name = "Symfony"
category = "build"
homepage = "https://symfony.com"
docs = "https://symfony.com/doc"
repo = "https://github.com/symfony/symfony"
description = "PHP web application framework"

[detect]
dependencies = ["symfony/framework-bundle"]
ecosystems = ["php"]

[commands]
run = "symfony server:start"
alternatives = ["php bin/console server:run"]

[taxonomy]
role = ["framework"]
function = ["api-development", "templating", "dependency-injection"]
layer = ["backend", "full-stack"]
domain = ["web-development"]

[[security.sinks]]
symbol = "|raw"
threat = "xss"
cwe = "CWE-79"
note = "Twig filter that bypasses escaping"

[[security.sinks]]
symbol = "createNativeQuery"
threat = "sql_injection"
cwe = "CWE-89"
note = "Doctrine raw SQL"

[[security.sinks]]
symbol = "RedirectResponse"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "redirect"
threat = "open_redirect"
cwe = "CWE-601"
note = "AbstractController::redirect"

[[security.sinks]]
symbol = "BinaryFileResponse"
threat = "path_traversal"
cwe = "CWE-22"
