[tool]
name = "FastAPI"
category = "build"
homepage = "https://fastapi.tiangolo.com"
docs = "https://fastapi.tiangolo.com"
repo = "https://github.com/fastapi/fastapi"
description = "Modern Python web framework for APIs"

[detect]
dependencies = ["fastapi"]
ecosystems = ["python"]

[commands]
run = "uvicorn main:app --reload"

[taxonomy]
role = ["framework"]
function = ["api-development", "validation"]
layer = ["backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "HTMLResponse"
threat = "xss"
cwe = "CWE-79"
note = "When content is not pre-escaped"

[[security.sinks]]
symbol = "RedirectResponse"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "FileResponse"
threat = "path_traversal"
cwe = "CWE-22"
