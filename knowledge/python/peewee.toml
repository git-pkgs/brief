[tool]
name = "Peewee"
category = "database"
homepage = "https://docs.peewee-orm.com"
docs = "https://docs.peewee-orm.com/en/latest/"
repo = "https://github.com/coleifer/peewee"
description = "Small Python ORM"

[detect]
dependencies = ["peewee"]
ecosystems = ["python"]

[taxonomy]
role = ["library"]
function = ["data-mapping"]
layer = ["data-layer"]

[[security.sinks]]
symbol = "SQL"
threat = "sql_injection"
cwe = "CWE-89"
note = "Raw SQL fragment"

[[security.sinks]]
symbol = "execute_sql"
threat = "sql_injection"
cwe = "CWE-89"
note = "Database.execute_sql"
