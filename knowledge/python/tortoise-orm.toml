[tool]
name = "Tortoise ORM"
category = "database"
homepage = "https://tortoise.github.io"
docs = "https://tortoise.github.io/getting_started.html"
repo = "https://github.com/tortoise/tortoise-orm"
description = "Async ORM for Python"

[detect]
dependencies = ["tortoise-orm"]
ecosystems = ["python"]

[taxonomy]
role = ["library"]
function = ["data-mapping"]
layer = ["data-layer"]

[[security.sinks]]
symbol = "execute_query"
threat = "sql_injection"
cwe = "CWE-89"
note = "connections.execute_query"

[[security.sinks]]
symbol = "RawSQL"
threat = "sql_injection"
cwe = "CWE-89"
