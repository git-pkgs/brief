[tool]
name = "HTTParty"
category = "build"
homepage = "https://github.com/jnunemaker/httparty"
docs = "https://github.com/jnunemaker/httparty"
repo = "https://github.com/jnunemaker/httparty"
description = "HTTP client with class-based API"

[detect]
dependencies = ["httparty"]
ecosystems = ["ruby"]

[taxonomy]
role = ["library"]
function = ["http-client"]
layer = ["backend"]

[[security.sinks]]
symbol = "HTTParty.get"
threat = "ssrf"
cwe = "CWE-918"

[[security.sinks]]
symbol = "HTTParty.post"
threat = "ssrf"
cwe = "CWE-918"
