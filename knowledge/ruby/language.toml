[tool]
name = "Ruby"
category = "language"
homepage = "https://www.ruby-lang.org"
docs = "https://docs.ruby-lang.org"
repo = "https://github.com/ruby/ruby"
description = "Dynamic, object-oriented programming language"

[detect]
files = ["Gemfile", "Rakefile", "*.rb", "**/*.rb", "*.gemspec"]
ecosystems = ["ruby"]

[taxonomy]
role = ["language"]

[[security.sinks]]
symbol = "eval"
threat = "code_injection"
cwe = "CWE-95"

[[security.sinks]]
symbol = "system"
threat = "command_injection"
cwe = "CWE-78"

[[security.sinks]]
symbol = "send"
threat = "unsafe_reflection"
cwe = "CWE-470"

[[security.sinks]]
symbol = "Marshal.load"
threat = "deserialization"
cwe = "CWE-502"
