[tool]
name = "RestClient"
category = "build"
homepage = "https://github.com/rest-client/rest-client"
docs = "https://github.com/rest-client/rest-client"
repo = "https://github.com/rest-client/rest-client"
description = "Simple HTTP and REST client"

[detect]
dependencies = ["rest-client"]
ecosystems = ["ruby"]

[taxonomy]
role = ["library"]
function = ["http-client"]
layer = ["backend"]

[[security.sinks]]
symbol = "RestClient.get"
threat = "ssrf"
cwe = "CWE-918"

[[security.sinks]]
symbol = "RestClient.post"
threat = "ssrf"
cwe = "CWE-918"

[[security.sinks]]
symbol = "RestClient::Request.execute"
threat = "ssrf"
cwe = "CWE-918"
