[tool]
name = "Sinatra"
category = "build"
homepage = "https://sinatrarb.com"
docs = "https://sinatrarb.com/documentation.html"
repo = "https://github.com/sinatra/sinatra"
description = "DSL for creating web applications in Ruby"

[detect]
dependencies = ["sinatra"]
ecosystems = ["ruby"]

[commands]
run = "ruby app.rb"

[taxonomy]
role = ["framework"]
function = ["api-development", "templating"]
layer = ["backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "erb"
threat = "ssti"
cwe = "CWE-1336"
note = "When template name or body is caller-controlled"

[[security.sinks]]
symbol = "haml"
threat = "ssti"
cwe = "CWE-1336"

[[security.sinks]]
symbol = "slim"
threat = "ssti"
cwe = "CWE-1336"

[[security.sinks]]
symbol = "redirect"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "send_file"
threat = "path_traversal"
cwe = "CWE-22"
