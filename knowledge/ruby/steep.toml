[tool]
name = "Steep"
category = "typecheck"
default = true
homepage = "https://github.com/soutaro/steep"
docs = "https://github.com/soutaro/steep#readme"
repo = "https://github.com/soutaro/steep"
description = "Gradual type checker for Ruby"

[detect]
files = ["Steepfile"]
dependencies = ["steep"]
ecosystems = ["ruby"]

[commands]
run = "steep check"

[config]
files = ["Steepfile"]

[taxonomy]
function = ["type-checking"]
