[tool]
name = "Actix Web"
category = "build"
homepage = "https://actix.rs"
docs = "https://actix.rs/docs"
repo = "https://github.com/actix/actix-web"
description = "Web framework for Rust"

[detect]
dependencies = ["actix-web"]
ecosystems = ["rust"]

[taxonomy]
role = ["framework"]
function = ["api-development"]
layer = ["backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "HttpResponse::Ok().body"
threat = "xss"
cwe = "CWE-79"
note = "When body is HTML and Content-Type is text/html"

[[security.sinks]]
symbol = "Redirect::to"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "NamedFile::open"
threat = "path_traversal"
cwe = "CWE-22"
note = "actix-files"
