[tool]
name = "Axum"
category = "build"
homepage = "https://github.com/tokio-rs/axum"
docs = "https://docs.rs/axum"
repo = "https://github.com/tokio-rs/axum"
description = "Ergonomic web framework for Rust"

[detect]
dependencies = ["axum"]
ecosystems = ["rust"]

[commands]
run = "cargo run"

[taxonomy]
role = ["framework"]
function = ["api-development"]
layer = ["backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "Html"
threat = "xss"
cwe = "CWE-79"
note = "axum::response::Html does not escape"

[[security.sinks]]
symbol = "Redirect::to"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "Redirect::permanent"
threat = "open_redirect"
cwe = "CWE-601"
