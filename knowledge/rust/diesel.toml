[tool]
name = "Diesel"
category = "database"
homepage = "https://diesel.rs"
docs = "https://diesel.rs/guides/"
repo = "https://github.com/diesel-rs/diesel"
description = "ORM and query builder with migrations for Rust"

[detect]
files = ["diesel.toml", "migrations/"]
dependencies = ["diesel"]
ecosystems = ["rust"]

[commands]
run = "diesel migration run"
alternatives = ["diesel migration generate"]

[config]
files = ["diesel.toml"]

[taxonomy]
role = ["library"]
function = ["data-mapping"]
layer = ["data-layer"]

[[security.sinks]]
symbol = "sql_query"
threat = "sql_injection"
cwe = "CWE-89"
note = "diesel::sql_query with format!"

[[security.sinks]]
symbol = "sql"
threat = "sql_injection"
cwe = "CWE-89"
note = "diesel::dsl::sql in expressions"
