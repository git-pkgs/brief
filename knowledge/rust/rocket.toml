[tool]
name = "Rocket"
category = "build"
homepage = "https://rocket.rs"
docs = "https://rocket.rs/guide/v0.5/"
repo = "https://github.com/rwf2/Rocket"
description = "Web framework for Rust"

[detect]
dependencies = ["rocket"]
ecosystems = ["rust"]

[commands]
run = "cargo run"

[taxonomy]
role = ["framework"]
function = ["api-development", "templating"]
layer = ["backend"]
domain = ["web-development"]

[[security.sinks]]
symbol = "RawHtml"
threat = "xss"
cwe = "CWE-79"
note = "rocket::response::content::RawHtml"

[[security.sinks]]
symbol = "Redirect::to"
threat = "open_redirect"
cwe = "CWE-601"

[[security.sinks]]
symbol = "NamedFile::open"
threat = "path_traversal"
cwe = "CWE-22"
