name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        ruby-version: ["3.2", "3.3", "3.4"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
      - run: bundle exec rspec
